    <style>
        :root {
            --primary: #7B3F10;
            --primary-dark: #5C2E08;
            --primary-light: #C8722A;
            --accent: #F5DEB3;
            --bg: #FFF9F4;
            --card-bg: #FFFFFF;
            --border: #EAD5BB;
            --text: #2C1810;
            --muted: #8A6A50;
            --green: #25D366;
            --shadow: 0 2px 10px rgba(123,63,16,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: white;
            padding: 14px 18px 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 3px 12px rgba(0,0,0,0.25);
        }
        header h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.3px; }
        header p  { font-size: 0.75rem; opacity: 0.80; margin-top: 2px; }

        /* ── NAME / IDENTITY BAR ── */
        .name-bar {
            background: white;
            padding: 12px 16px;
            border-bottom: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .name-bar-title {
            font-weight: 800;
            font-size: 0.82rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .name-bar-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .name-bar select, .name-bar input {
            flex: 1;
            min-width: 140px;
            padding: 9px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
        }
        .name-bar select:focus, .name-bar input:focus {
            border-color: var(--primary);
            background: white;
        }
        .name-bar select { cursor: pointer; }
        .name-bar .field-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 140px;
            gap: 2px;
        }
        .name-bar .field-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--muted);
            padding-left: 2px;
        }
        .name-bar input.auto-filled {
            background: #F0FAF0;
            border-color: #A8D5A2;
            color: #2E6E28;
        }

        /* ── TABS ── */
        .tabs-wrap {
            background: white;
            border-bottom: 2px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs-wrap::-webkit-scrollbar { display: none; }
        .tabs {
            display: flex;
            gap: 6px;
            padding: 10px 14px;
            width: max-content;
        }
        .tab {
            padding: 7px 14px;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--muted);
            white-space: nowrap;
            transition: all 0.18s;
        }
        .tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ── MENU SECTION ── */
        .section { display: none; padding: 14px 14px 6px; }
        .section.active { display: block; }

        .section-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 3px solid var(--accent);
        }

        .note-box {
            background: #FFF8E1;
            border-left: 4px solid #FFB300;
            border-radius: 0 8px 8px 0;
            padding: 8px 12px;
            font-size: 0.78rem;
            color: #795B00;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .items-list { display: flex; flex-direction: column; gap: 7px; }

        .item-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            box-shadow: var(--shadow);
            gap: 10px;
        }
        .item-text { flex: 1; min-width: 0; }
        .item-name {
            font-weight: 700;
            font-size: 0.82rem;
            color: var(--primary);
            line-height: 1.25;
        }
        .item-desc {
            font-size: 0.73rem;
            color: var(--muted);
            margin-top: 2px;
            line-height: 1.3;
        }
        .item-price {
            font-weight: 800;
            color: var(--primary);
            font-size: 0.88rem;
            white-space: nowrap;
        }
        .item-ctrl {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .qbtn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.12s;
            line-height: 1;
            padding: 0;
        }
        .qbtn:active, .qbtn.has-qty { background: var(--primary); color: white; }
        .qty-num {
            font-weight: 800;
            min-width: 18px;
            text-align: center;
            font-size: 0.9rem;
        }
        .qty-num.positive { color: var(--primary); }

        /* Extra section (supplements + vrije bestelling) */
        .extra-section {
            padding: 14px 14px 100px;
        }
        .custom-card {
            background: white;
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-top: 4px;
        }
        .custom-card label {
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--primary);
            display: block;
            margin-bottom: 8px;
        }
        .custom-card textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.88rem;
            resize: vertical;
            min-height: 75px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
            color: var(--text);
        }
        .custom-card textarea:focus { border-color: var(--primary); }

        /* ── CART FAB ── */
        #cartFab {
            position: fixed;
            bottom: 20px;
            right: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 26px;
            padding: 13px 20px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 18px rgba(123,63,16,0.45);
            z-index: 200;
            display: none;
            align-items: center;
            gap: 8px;
            transition: transform 0.12s;
        }
        #cartFab:active { transform: scale(0.95); }
        .badge {
            background: #E53935;
            color: white;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 0.78rem;
            font-weight: 800;
        }

        /* ── MODALS ── */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.48);
            z-index: 300;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .overlay.open { display: flex; }

        .sheet {
            background: white;
            width: 100%;
            max-width: 520px;
            max-height: 92vh;
            border-radius: 20px 20px 0 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sheet-head {
            background: var(--primary);
            color: white;
            padding: 15px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .sheet-head h2 { font-size: 1.05rem; }
        .xbtn {
            background: none; border: none; color: white;
            font-size: 1.4rem; cursor: pointer; padding: 0; line-height: 1;
        }
        .sheet-body { flex: 1; overflow-y: auto; padding: 16px; }
        .sheet-foot {
            padding: 14px 18px;
            border-top: 2px solid var(--border);
            flex-shrink: 0;
        }

        /* Cart sheet */
        .cart-line {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }
        .cart-line-info { flex: 1; }
        .cart-line-name { font-size: 0.86rem; font-weight: 600; line-height: 1.3; }
        .cart-line-sub  { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }
        .cart-line-price { font-weight: 800; color: var(--primary); white-space: nowrap; font-size: 0.9rem; }
        .cart-empty-msg { text-align: center; padding: 40px; color: var(--muted); }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: 14px;
        }
        .main-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.98rem;
            font-weight: 800;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.15s;
        }
        .main-btn:active { background: var(--primary-dark); }
        .main-btn.green { background: var(--green); }
        .main-btn.green:active { background: #1DA851; }

        /* Payment sheet */
        .pay-sheet-body { padding: 16px; overflow-y: auto; max-height: calc(92vh - 60px); }

        .qr-block {
            background: var(--bg);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            margin-bottom: 14px;
            border: 1px solid var(--border);
        }
        .qr-block h3 { color: var(--primary); font-size: 0.95rem; margin-bottom: 12px; }
        .qr-img-wrap {
            display: inline-block;
            background: white;
            padding: 12px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            margin-bottom: 10px;
        }
        #qrCanvas { display: block; }
        #qrCanvas img, #qrCanvas canvas { display: block; }
        .qr-amount { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .qr-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

        .order-recap {
            background: var(--bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
        }
        .order-recap h3 { font-size: 0.88rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
        .recap-line {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            padding: 3px 0;
            border-bottom: 1px solid var(--border);
        }
        .recap-line:last-child { border: none; }
        .recap-total {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            font-weight: 800;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px solid var(--border);
        }

        .send-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

        .deadline-note {
            text-align: center;
            font-size: 0.76rem;
            color: var(--muted);
            padding-bottom: 8px;
        }

        .closed-banner {
            background: #D32F2F;
            color: #fff;
            text-align: center;
            padding: 14px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
        }
        .closed-banner small {
            display: block;
            font-weight: 400;
            font-size: 0.78rem;
            margin-top: 4px;
            opacity: 0.85;
        }

        @media (min-width: 540px) {
            .items-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .sheet { border-radius: 20px; margin-bottom: 20px; }
            .overlay { align-items: center; }
        }
    </style>
</head>

<button id="cartFab" onclick="openCart()">

<div class="overlay" id="cartOverlay">

        <div class="sheet-foot">
            <div class="total-row">
                <span>Totaal:</span>
                <span id="cartTotaal">€ 0,00</span>
            </div>
            <button class="main-btn" onclick="openPayment()">Betalen &amp; doorsturen →</button>
        </div>
    </div>
</div>

<!-- ===== PAYMENT OVERLAY ===== -->
<div class="overlay" id="payOverlay">
    <div class="sheet" style="border-radius:20px 20px 0 0; max-height:92vh;">
        <div class="sheet-head">
            <h2>💳 Betaling &amp; bestelling</h2>
            <button class="xbtn" onclick="closePayment()">✕</button>
        </div>
        <div class="pay-sheet-body" id="payBody"></div>

</div>

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const cart = {}; // id → { n, d, p, qty }

// ─────────────────────────────────────────────
//  COLLEAGUE SELECTOR
// ─────────────────────────────────────────────
function buildColleagueSelect() {
    const sel = document.getElementById('colleagueSelect');
    COLLEAGUES.forEach((c, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = c.naam;
        sel.appendChild(opt);
    });
    // Always add "Andere naam" option
    const other = document.createElement('option');
    other.value = 'other';
    other.textContent = '✏️ Andere naam / e-mail...';
    sel.appendChild(other);
}

function onSelectColleague() {
    const sel   = document.getElementById('colleagueSelect');
    const val   = sel.value;
    const manual = document.getElementById('manualFields');

    if (val === '') {
        manual.style.display = 'none';
        return;
    }

    manual.style.display = 'flex';
    const naamEl  = document.getElementById('naam');
    const emailEl = document.getElementById('emailVan');

    if (val === 'other') {
        naamEl.value  = '';
        emailEl.value = '';
        naamEl.className  = '';
        emailEl.className = '';
        naamEl.readOnly   = false;
        emailEl.readOnly  = false;
        naamEl.focus();
    } else {
        const c = COLLEAGUES[parseInt(val)];
        naamEl.value  = c.naam;
        emailEl.value = c.email;
        naamEl.className  = 'auto-filled';
        emailEl.className = 'auto-filled';
        // Still editable — remove readonly so user can tweak if needed
        naamEl.readOnly   = false;
        emailEl.readOnly  = false;
    }
}

function getIdentity() {
    return {
        naam:  (document.getElementById('naam')?.value  || '').trim(),
        email: (document.getElementById('emailVan')?.value || '').trim(),
    };
}

// ─────────────────────────────────────────────
//  BUILD MENU
// ─────────────────────────────────────────────
function buildMenu() {
    const tabsEl = document.getElementById('tabs');
    const secEl  = document.getElementById('sections');

    MENU.forEach((cat, i) => {
        // Tab
        const t = document.createElement('button');
        t.className = 'tab' + (i === 0 ? ' active' : '');
        t.textContent = cat.tab;
        t.onclick = () => switchCat(cat.id);
        tabsEl.appendChild(t);

        // Section
        const s = document.createElement('div');
        s.id = 'sec-' + cat.id;
        s.className = 'section' + (i === 0 ? ' active' : '');

        let html = `<div class="section-title">${cat.title}</div>`;
        if (cat.note) html += `<div class="note-box">⚠️ ${cat.note}</div>`;
        html += '<div class="items-list">';

        cat.items.forEach(item => {
            const esc = (s) => (s||'').replace(/'/g, "\\'");
            html += `
            <div class="item-card">
                <div class="item-text">
                    <div class="item-name">${item.n}</div>
                    ${item.d ? `<div class="item-desc">${item.d}</div>` : ''}
                </div>
                <div class="item-price">€ ${fmt(item.p)}</div>
                <div class="item-ctrl">
                    <button class="qbtn" onclick="dec('${item.id}')">−</button>
                    <span class="qty-num" id="q-${item.id}">0</span>
                    <button class="qbtn" onclick="inc('${item.id}','${esc(item.n)}','${esc(item.d||'')}',${item.p})">+</button>
                </div>
            </div>`;
        });

        html += '</div>';
        s.innerHTML = html;
        secEl.appendChild(s);
    });
}

function switchCat(id) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', MENU[i].id === id));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + id));
    // Scroll tab into view
    const idx = MENU.findIndex(m => m.id === id);
    document.querySelectorAll('.tab')[idx]?.scrollIntoView({block:'nearest', inline:'center', behavior:'smooth'});
}

// ─────────────────────────────────────────────
//  CART LOGIC
// ─────────────────────────────────────────────
function inc(id, n, d, p) {
    if (!cart[id]) cart[id] = { n, d, p, qty: 0 };
    cart[id].qty++;
    refreshQty(id);
    refreshFab();
}
function dec(id) {
    if (!cart[id] || cart[id].qty === 0) return;
    cart[id].qty--;
    if (cart[id].qty === 0) delete cart[id];
    refreshQty(id);
    refreshFab();
}
function refreshQty(id) {
    const el = document.getElementById('q-' + id);
    if (!el) return;
    const qty = cart[id]?.qty || 0;
    el.textContent = qty;
    el.className = 'qty-num' + (qty > 0 ? ' positive' : '');
}
function cartItems() { return Object.values(cart).filter(v => v.qty > 0); }
function total()     { return cartItems().reduce((s, v) => s + v.p * v.qty, 0); }
function itemCount() { return cartItems().reduce((s, v) => s + v.qty, 0); }
function fmt(n)      { return n.toFixed(2).replace('.', ','); }

function refreshFab() {
    const n = itemCount();
    const fab = document.getElementById('cartFab');
    fab.style.display = n > 0 ? 'flex' : 'none';
    document.getElementById('fabCount').textContent = n;
    document.getElementById('cartTotaal').textContent = '€ ' + fmt(total());
}

// ─────────────────────────────────────────────
//  CART MODAL
// ─────────────────────────────────────────────
function openCart() {
    const items = cartItems();
    const el = document.getElementById('cartBody');
    if (items.length === 0) {
        el.innerHTML = '<div class="cart-empty-msg">Nog geen items toegevoegd.<br>Kies iets uit het menu!</div>';
    } else {
        let html = '';
        items.forEach(v => {
            html += `<div class="cart-line">
                <div class="cart-line-info">
                    <div class="cart-line-name">${v.n}</div>
                    <div class="cart-line-sub">${v.qty}x @ €${fmt(v.p)}</div>
                </div>
                <div class="cart-line-price">€ ${fmt(v.p * v.qty)}</div>
            </div>`;
        });
        const vrij = document.getElementById('vrij').value.trim();
        if (vrij) html += `<div class="cart-line"><div class="cart-line-info"><div class="cart-line-name">✏️ ${vrij}</div></div></div>`;
        el.innerHTML = html;
    }
    document.getElementById('cartOverlay').classList.add('open');
}
function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); }

// ─────────────────────────────────────────────
//  PAYMENT MODAL
// ─────────────────────────────────────────────
function openPayment() {
    if (!isBestellingOpen()) {
        alert(`⛔ Bestellingen zijn gesloten.\n\nGesloten van ${DAGEN[CFG.sluit_dag]} ${CFG.sluit_uur}:00 tot ${DAGEN[CFG.open_dag]} ${CFG.open_uur}:00.\n\nWeer open: ${volgendeOpeningTekst()}`);
        return;
    }
    const { naam, email: emailVan } = getIdentity();
    if (!naam) {
        alert('Selecteer eerst jouw naam bovenaan!');
        closeCart();
        document.getElementById('colleagueSelect').focus();
        return;
    }
    if (itemCount() === 0) { alert('Je bestelling is leeg!'); return; }

    const items = cartItems();
    const tot   = total();
    const vrij  = document.getElementById('vrij').value.trim();
    const datum = new Date().toLocaleDateString('nl-BE');

    // ── EPC/SEPA QR (werkt in KBC Mobile en alle Belgische bankapps) ──
    const epcData = [
        'BCD',          // Service Tag
        '002',          // Version
        '1',            // UTF-8
        'SCT',          // SEPA Credit Transfer
        '',             // BIC (optioneel, leeg = automatisch)
        CFG.naam_rek,
        CFG.iban,
        'EUR' + tot.toFixed(2),
        '',             // Purpose (leeg)
        '',             // Structured reference (leeg)
        'Broodje ' + naam + ' ' + datum,
    ].join('\n');

    // ── Order text ──
    let orderTxt = items.map(v => `${v.qty}x ${v.n}${v.d ? ' ('+v.d+')' : ''} – €${fmt(v.p * v.qty)}`).join('\n');
    if (vrij) orderTxt += '\n✏️ ' + vrij;

    // ── Recap HTML ──
    let recapHtml = items.map(v => `
        <div class="recap-line">
            <span>${v.qty}× ${v.n}</span>
            <span style="font-weight:700">€ ${fmt(v.p * v.qty)}</span>
        </div>`).join('');
    if (vrij) recapHtml += `<div class="recap-line"><span>✏️ ${vrij}</span><span></span></div>`;
    recapHtml += `<div class="recap-total"><span>Totaal</span><span>€ ${fmt(tot)}</span></div>`;

    // ── Email ──
    const subj  = encodeURIComponent(`Broodjesbestelling ${naam} – ${datum}`);
    const body  = encodeURIComponent(
        `Hallo Louis,\n\nBestelling van: ${naam}${emailVan ? ' <'+emailVan+'>' : ''}\nDatum: ${datum}\n\n${orderTxt}\n\nTotaal: €${tot.toFixed(2)}\n\nBetaald via Bancontact/Payconiq.\n\nGroeten,\n${naam}`
    );
    const mailHref = `mailto:${CFG.email}?subject=${subj}&body=${body}`;

    // ── WhatsApp ──
    const waTxt = encodeURIComponent(
        `🥖 Broodjesbestelling\nNaam: ${naam}\nDatum: ${datum}\n\n${orderTxt}\n\nTotaal: €${tot.toFixed(2)} ✅ betaald via Payconiq`
    );
    const waHref = `https://wa.me/${CFG.whatsapp}?text=${waTxt}`;

    document.getElementById('payBody').innerHTML = `
        <div class="qr-block">
            <h3>🏦 Betaal via KBC / bankapp</h3>
            <div class="qr-img-wrap">
                <div id="qrCanvas"></div>
            </div>
            <div class="qr-amount">€ ${fmt(tot)}</div>
            <div class="qr-sub">Scan met KBC Mobile of andere bankapp</div>
            <div style="margin-top:10px;font-size:0.75rem;color:var(--muted)">
                IBAN: <strong>${CFG.iban}</strong><br>
                Mededeling: <strong>Broodje ${naam}</strong>
            </div>
        </div>

        <div class="order-recap">
            <h3>📋 Bestelling – ${naam}</h3>
            ${recapHtml}
        </div>

        <div class="send-btns">
            <button class="main-btn" id="sendMailBtn" onclick="sendOrderEmail()">📧 Bestelling bevestigen &amp; doorsturen</button>
            <a href="${waHref}" target="_blank" class="main-btn green">💬 Doorsturen via WhatsApp</a>
        </div>
        <div id="mailStatus" style="text-align:center;font-size:0.85rem;margin-top:6px;min-height:20px"></div>

        <div class="deadline-note">
            Bestellingen doorsturen vóór <strong>${CFG.deadline}</strong> &mdash; info@baguetjemeerbeke.be
        </div>`;

    closeCart();
    document.getElementById('payOverlay').classList.add('open');

    // Genereer EPC/SEPA QR client-side na render
    new QRCode(document.getElementById('qrCanvas'), {
        text:         epcData,
        width:        180,
        height:       180,
        colorDark:    '#000000',
        colorLight:   '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
    });

    // Sla order op voor e-mail functie
    window._pendingOrder = { naam, emailVan, orderTxt, tot, datum };
}
function closePayment() {
    document.getElementById('payOverlay').classList.remove('open');
    // Wis QR zodat hij opnieuw gegenereerd wordt bij volgende bestelling
    const c = document.getElementById('qrCanvas');
    if (c) c.innerHTML = '';
}

// Sluit overlay bij klik buiten sheet
['cartOverlay','payOverlay'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('open');
    });
});

// ─────────────────────────────────────────────
//  EMAIL (EmailJS — automatisch, geen mailapp)
// ─────────────────────────────────────────────
function sendOrderEmail() {
    const btn    = document.getElementById('sendMailBtn');
    const status = document.getElementById('mailStatus');
    const o      = window._pendingOrder;
    if (!o) return;

    btn.disabled    = true;
    btn.textContent = '⏳ Bezig met verzenden...';
    status.textContent = '';

    const orderParams = {
        to_email:   CFG.email,
        from_naam:  o.naam,
        from_email: o.emailVan || '',
        datum:      o.datum,
        bestelling: o.orderTxt,
        totaal:     '€ ' + o.tot.toFixed(2).replace('.', ','),
        iban:       CFG.iban,
    };

    // 1) Mail naar Louis
    emailjs.send(CFG.ejs_service_id, CFG.ejs_template_id, orderParams)
    .then(() => {
        // 2) Bevestigingsmail naar collega (alleen als e-mail ingevuld)
        const sends = [];
        if (o.emailVan) {
            sends.push(emailjs.send(CFG.ejs_service_id, CFG.ejs_confirm_template_id, {
                to_email:   o.emailVan,
                from_naam:  o.naam,
                datum:      o.datum,
                bestelling: o.orderTxt,
                totaal:     '€ ' + o.tot.toFixed(2).replace('.', ','),
                deadline:   CFG.deadline,
            }));
        }
        return Promise.all(sends);
    })
    .then(() => {
        btn.textContent      = '✅ Bestelling verzonden!';
        btn.style.background = '#4CAF50';
        status.style.color   = '#2E7D32';
        status.textContent   = o.emailVan
            ? 'Louis ontvangt jouw bestelling. Jij krijgt ook een bevestiging per mail.'
            : 'Louis ontvangt jouw bestelling per mail.';
        window._pendingOrder = null;
    })
    .catch((err) => {
        btn.disabled         = false;
        btn.textContent      = '📧 Bestelling bevestigen & doorsturen';
        status.style.color   = '#C62828';
        status.textContent   = 'Verzenden mislukt — probeer WhatsApp als alternatief.';
        console.error('EmailJS fout:', err);
    });
}

emailjs.init({ publicKey: CFG.ejs_public_key });

// ── Besteldag check ──
const DAGEN = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];

// Gesloten = maandag 13:00 → dinsdag 15:00, rest van de week open
function tijdAlsMinuten(dag, uur, min) {
    return dag * 1440 + uur * 60 + min;
}

function isBestellingOpen() {
    const now = new Date();
    const t   = tijdAlsMinuten(now.getDay(), now.getHours(), now.getMinutes());
    const sluit = tijdAlsMinuten(CFG.sluit_dag, CFG.sluit_uur, CFG.sluit_min);
    const open  = tijdAlsMinuten(CFG.open_dag,  CFG.open_uur,  CFG.open_min);
    // Gesloten als t >= sluit EN t < open
    return !(t >= sluit && t < open);
}

function volgendeOpeningTekst() {
    const now = new Date();
    const t   = tijdAlsMinuten(now.getDay(), now.getHours(), now.getMinutes());
    const open = tijdAlsMinuten(CFG.open_dag, CFG.open_uur, CFG.open_min);

    let diff = CFG.open_dag - now.getDay();
    if (diff < 0 || (diff === 0 && t >= open)) diff += 7;
    const volgende = new Date(now);
    volgende.setDate(volgende.getDate() + diff);
    const d = volgende.getDate();
    const m = volgende.getMonth() + 1;
    const uu = String(CFG.open_uur).padStart(2,'0');
    const mm = String(CFG.open_min).padStart(2,'0');
    return `${DAGEN[CFG.open_dag]} ${d}/${m} om ${uu}:${mm}`;
}

function checkBestelStatus() {
    const banner = document.getElementById('closedBanner');
    if (!isBestellingOpen()) {
        banner.innerHTML = `⛔ Bestellingen zijn gesloten<small>Weer open: ${volgendeOpeningTekst()}</small>`;
        banner.style.display = 'block';
    } else {
        banner.style.display = 'none';
    }
}

checkBestelStatus();
// Hercheck elke minuut
setInterval(checkBestelStatus, 60000);
